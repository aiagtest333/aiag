name: Complete DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  packages: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  JAVA_VERSION: "17"

###############################################################################
# STAGE 1 — SECRET SCANNING
###############################################################################
jobs:
  trufflehog:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: HEAD
          extra_args: --only-verified

###############################################################################
# STAGE 2 — SAST
###############################################################################
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep SAST
        run: |
          semgrep scan \
            --config=auto \
            --sarif \
            --output=semgrep.sarif \
            --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

###############################################################################
# STAGE 3 — BUILD + SBOM
###############################################################################
  build:
    name: Build & Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [trufflehog, semgrep]
    steps:
      - uses: actions/checkout@v4
      - name: Set Up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress clean package -DskipTests
      - name: Generate CycloneDX SBOM
        run: |
          mvn --batch-mode --no-transfer-progress \
            org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
            -DoutputFormat=json \
            -DincludeLicenseText=true
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/bom.json
          retention-days: 7

###############################################################################
# STAGE 4 — FILESYSTEM / SCA SCAN
###############################################################################
  trivy-fs:
    name: SCA / Filesystem Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      # Pass 1 — table format so exit-code works reliably (sarif+exit-code bug)
      - name: Trivy Filesystem Scan (gate)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      # Pass 2 — SARIF only for GitHub Security tab upload
      - name: Trivy Filesystem Scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload Trivy FS SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

###############################################################################
# STAGE 5 — CONTAINER BUILD
###############################################################################
  container:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    needs: [build, trivy-fs]

    outputs:
      # image-ref is set by the explicit capture step below.
      # env context is NOT available in job outputs — only steps context is.
      image-ref: ${{ steps.image-meta.outputs.image-ref }}

    steps:
      - uses: actions/checkout@v4
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker Build & Push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Capture the full immutable ref as a step output so it can be used
      # in job-level outputs and safely passed to all downstream jobs.
      - name: Capture immutable image ref
        id: image-meta
        run: |
          IMAGE_REF="${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          echo "image-ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Captured image ref: ${IMAGE_REF}"

###############################################################################
# STAGE 6 — CONTAINER IMAGE SCAN
# needs: container  — so needs.container.outputs.image-ref is in scope
###############################################################################
  image-scan:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: container

    outputs:
      # Thread image-ref forward so signing/verify/deploy can access it
      # via needs.image-scan.outputs.image-ref without needing to also
      # declare needs.container (which would require being careful about
      # transitive needs ordering).
      image-ref: ${{ needs.container.outputs.image-ref }}

    steps:
      - uses: actions/checkout@v4
      - name: Cache Trivy Java DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy/java-db
          key: trivy-java-db-${{ github.run_id }}
          restore-keys: trivy-java-db-
      # Pass 1 — table + exit-code (sarif+exit-code bug workaround)
      - name: Trivy Image Scan (gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.container.outputs.image-ref }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      # Pass 2 — SARIF for Security tab
      - name: Trivy Image Scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.container.outputs.image-ref }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Upload Image Scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

###############################################################################
# STAGE 7 — SIGN IMAGE + ATTEST SBOM
# needs: image-scan  — image-ref flows via image-scan.outputs.image-ref
###############################################################################
  signing:
    name: Sign Image & Attest SBOM (Cosign)
    runs-on: ubuntu-latest
    needs: image-scan

    outputs:
      image-ref: ${{ needs.image-scan.outputs.image-ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Container Image
        env:
          IMAGE_REF: ${{ needs.image-scan.outputs.image-ref }}
        run: |
          echo "Signing: ${IMAGE_REF}"
          cosign sign --yes "${IMAGE_REF}"

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      - name: Sign SBOM Blob
        run: |
          cosign sign-blob \
            --yes \
            bom.json \
            --output-signature bom.json.sig \
            --output-certificate bom.json.pem

      - name: Attest SBOM to Image
        env:
          IMAGE_REF: ${{ needs.image-scan.outputs.image-ref }}
        run: |
          cosign attest \
            --yes \
            --predicate bom.json \
            --type cyclonedx \
            "${IMAGE_REF}"

      - name: Upload Signed SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-sbom
          path: |
            bom.json
            bom.json.sig
            bom.json.pem
          retention-days: 90

###############################################################################
# STAGE 8 — VERIFY SIGNATURES
###############################################################################
  verify:
    name: Verify Signatures (Cosign)
    runs-on: ubuntu-latest
    needs: signing

    outputs:
      image-ref: ${{ needs.signing.outputs.image-ref }}

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Image Signature
        env:
          IMAGE_REF: ${{ needs.signing.outputs.image-ref }}
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_REF}"

      - name: Verify SBOM Attestation
        env:
          IMAGE_REF: ${{ needs.signing.outputs.image-ref }}
        run: |
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_REF}"

###############################################################################
# STAGE 9 — DEPLOY
###############################################################################
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy to Kubernetes
        env:
          IMAGE_REF: ${{ needs.verify.outputs.image-ref }}
        run: |
          echo "Deploying ${IMAGE_REF} …"
          # kubectl set image deployment/app \
          #   app="${IMAGE_REF}" \
          #   --namespace=production
