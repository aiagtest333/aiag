name: Complete DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  packages: write
  id-token: write       # Required for Cosign keyless signing via OIDC

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  JAVA_VERSION: "17"

###############################################################################
# STAGE 1 — SECRET SCANNING
# Scans every commit in the push for leaked credentials/tokens.
###############################################################################
jobs:
  trufflehog:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history needed for diff-based scanning

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}   # Only scan changed commits on push
          head: HEAD
          extra_args: --only-verified        # Suppress unverified low-signal results

###############################################################################
# STAGE 2 — STATIC ANALYSIS (SAST)
# Semgrep checks for security anti-patterns in source code.
###############################################################################
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        run: |
          semgrep scan \
            --config=auto \
            --sarif \
            --output=semgrep.sarif \
            --error                  # Exit non-zero if findings exist
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}   # Optional — omit for OSS-only

      - name: Upload Semgrep SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

###############################################################################
# STAGE 3 — BUILD + SBOM GENERATION
# Compiles the application and produces a CycloneDX SBOM over all dependencies.
# Only runs after secret scanning and SAST pass.
###############################################################################
  build:
    name: Build & Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [trufflehog, semgrep]

    outputs:
      jar-name: ${{ steps.meta.outputs.jar-name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set Up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven              # Cache ~/.m2 between runs

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress clean package -DskipTests

      # CycloneDX Maven plugin must be declared in pom.xml (see project files).
      # makeAggregateBom produces a single BOM covering direct + transitive deps.
      - name: Generate CycloneDX SBOM
        run: |
          mvn --batch-mode --no-transfer-progress \
            org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
            -DoutputFormat=json \
            -DincludeLicenseText=true

      - name: Capture artifact name
        id: meta
        run: echo "jar-name=$(ls target/*.jar | head -1 | xargs basename)" >> "$GITHUB_OUTPUT"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

      - name: Upload SBOM (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/bom.json
          retention-days: 7

###############################################################################
# STAGE 4 — FILESYSTEM / SCA SCAN
# Trivy scans the repository filesystem for vulnerable dependencies and
# misconfigured IaC before we build the container image.
###############################################################################
  trivy-fs:
    name: SCA / Filesystem Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      # Pass 1 — table format so exit-code works reliably.
      # The SARIF format + exit-code combination has a known bug in trivy-action
      # where it exits 1 even with 0 findings; using table here avoids that.
      - name: Trivy Filesystem Scan (gate)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      # Pass 2 — SARIF format for GitHub Security tab upload (no exit-code).
      - name: Trivy Filesystem Scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy FS SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

###############################################################################
# STAGE 5 — CONTAINER BUILD
# Builds and pushes the image to GHCR.  We capture the immutable digest so
# every downstream step references a specific image, never a mutable tag.
###############################################################################
  container:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    needs: [build, trivy-fs]

    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-ref: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Build & Push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false        # We attach our own Cosign provenance later
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

###############################################################################
# STAGE 6 — CONTAINER IMAGE SCAN
# Trivy scans the pushed image using its immutable digest.
###############################################################################
  image-scan:
    name: Container Image Scan (Trivy)
    runs-on: ubuntu-latest
    needs: container

    steps:
      # checkout is needed so upload-sarif has a git context (avoids the
      # "does not appear to be a git repository" warning seen in the logs)
      - uses: actions/checkout@v4

      # Cache the Trivy Java DB (876 MiB) so it isn't re-downloaded every run.
      # The DB refreshes every 3 days; keying on the date achieves that cadence.
      - name: Cache Trivy Java DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy/java-db
          key: trivy-java-db-${{ github.run_id }}
          restore-keys: trivy-java-db-

      # Pass 1 — table format, exit-code enforced.
      - name: Trivy Image Scan (gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.container.outputs.image-ref }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      # Pass 2 — SARIF for GitHub Security tab (no exit-code).
      - name: Trivy Image Scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.container.outputs.image-ref }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Image Scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

###############################################################################
# STAGE 7 — SIGN IMAGE + ATTEST SBOM
# Uses Cosign with keyless signing (OIDC / Sigstore).
# - Signs the container image by digest
# - Signs the SBOM blob and uploads the signature as an artifact
# - Attaches the SBOM to the image as a Cosign attestation
###############################################################################
  signing:
    name: Sign Image & Attest SBOM (Cosign)
    runs-on: ubuntu-latest
    needs: image-scan

    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Sign by digest — immutable reference, not a mutable :latest tag
      - name: Sign Container Image
        run: |
          cosign sign \
            --yes \
            ${{ needs.container.outputs.image-ref }}

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom

      # Sign the SBOM blob and preserve both file + detached signature
      - name: Sign SBOM Blob
        run: |
          cosign sign-blob \
            --yes \
            bom.json \
            --output-signature bom.json.sig \
            --output-certificate bom.json.pem

      # Attach the SBOM as a verifiable attestation on the image itself.
      # This means `cosign verify-attestation` can later prove the SBOM
      # came from this pipeline and has not been tampered with.
      - name: Attest SBOM to Image
        run: |
          cosign attest \
            --yes \
            --predicate bom.json \
            --type cyclonedx \
            ${{ needs.container.outputs.image-ref }}

      - name: Upload Signed SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-sbom
          path: |
            bom.json
            bom.json.sig
            bom.json.pem
          retention-days: 90

###############################################################################
# STAGE 8 — VERIFY SIGNATURES (optional but recommended)
# Proves the signing step worked before we deploy anything.
###############################################################################
  verify:
    name: Verify Signatures (Cosign)
    runs-on: ubuntu-latest
    needs: signing

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Image Signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ needs.container.outputs.image-ref }}

      - name: Verify SBOM Attestation
        run: |
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ needs.container.outputs.image-ref }}

###############################################################################
# STAGE 9 — DEPLOY
# Only runs on pushes to main (not PRs) and only after the full security
# gauntlet + signature verification passes.
###############################################################################
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: production          # Requires manual approval if configured

    steps:
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying ${{ needs.container.outputs.image-ref }} …"
          # kubectl set image deployment/app \
          #   app=${{ needs.container.outputs.image-ref }} \
          #   --namespace=production
